version: "3.9"

services:
  prism:
    build:
      context: .
      dockerfile: Dockerfile
    image: prism:latest
    container_name: prism
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
