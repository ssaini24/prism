# Reusable Prism Code Review Workflow
# Target repos use: uses: ssaini24/prism/.github/workflows/review.yml@main
name: Prism Code Review

on:
  workflow_call:
    inputs:
      llm_provider:
        description: "LLM provider: 'claude-code' (default, uses local claude binary) or 'anthropic' (needs ANTHROPIC_API_KEY)"
        required: false
        type: string
        default: "claude-code"
    secrets:
      ANTHROPIC_API_KEY:
        required: false

jobs:
  # ── Job 1: ORM analysis (PHP + optional Boost MCP + real MySQL) ──────────
  orm-analysis:
    name: ORM Analysis
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: secret
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          path: target-repo

      - name: Checkout Prism repo
        uses: actions/checkout@v4
        with:
          repository: ssaini24/prism
          path: prism-action

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo, pdo_mysql, mbstring

      - name: Install target repo PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: target-repo

      - name: Install Laravel Boost
        run: composer require laravel/boost --dev --no-interaction
        working-directory: target-repo

      - name: Run database migrations
        run: php artisan migrate --force
        working-directory: target-repo
        env:
          APP_KEY: ${{ secrets.APP_KEY || 'base64:dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=' }}
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: secret

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Prism Python dependencies
        run: pip install -r requirements.txt
        working-directory: prism-action

      - name: Install Claude CLI
        if: inputs.llm_provider == 'claude-code'
        run: npm install -g @anthropic-ai/claude-code

      - name: Fetch PR diff
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --jq '.[] | "--- a/\(.filename)\n+++ b/\(.filename)\n\(.patch // "")"' > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run ORM reviewer
        run: |
          python prism-action/action/orm_review.py \
            --diff=/tmp/pr.diff \
            --output=/tmp/orm-results.json \
            --laravel-path=${{ github.workspace }}/target-repo
        env:
          LLM_PROVIDER: ${{ inputs.llm_provider }}
          LLM_MODEL: claude-haiku-4-5-20251001
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APP_KEY: base64:dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXQ=
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: secret

      - name: Upload ORM results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orm-results
          path: /tmp/orm-results.json
          if-no-files-found: warn

  # ── Job 2: Static analysis (SQL + other code files) ──────────────────────
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Prism repo
        uses: actions/checkout@v4
        with:
          repository: ssaini24/prism
          path: prism-action

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prism-action/requirements.txt

      - name: Install Prism Python dependencies
        run: pip install -r requirements.txt
        working-directory: prism-action

      - name: Fetch PR diff
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files \
            --jq '[.[].patch // ""] | join("\n")' > /tmp/pr.diff
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Run static analysis
        run: |
          python action/analyze.py \
            --diff=/tmp/pr.diff \
            --output=/tmp/static-results.json \
            --repo=${{ github.repository }}
        working-directory: prism-action
        env:
          LLM_PROVIDER: ${{ inputs.llm_provider }}
          LLM_MODEL: claude-haiku-4-5-20251001
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ENABLE_ORM_REVIEW: "false"
          ENABLE_CODE_REVIEW: "false"
          ENABLE_DB_ANALYSIS_VIA_MCP: "false"

      - name: Upload static results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-results
          path: /tmp/static-results.json
          if-no-files-found: warn

  # ── Job 3: Post PR comments ───────────────────────────────────────────────
  post-comments:
    name: Post Review Comments
    runs-on: ubuntu-latest
    needs: [orm-analysis, static-analysis]
    if: always()

    steps:
      - name: Checkout Prism repo
        uses: actions/checkout@v4
        with:
          repository: ssaini24/prism
          path: prism-action

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: prism-action/requirements.txt

      - name: Install Prism Python dependencies
        run: pip install -r requirements.txt
        working-directory: prism-action

      - name: Download ORM results
        uses: actions/download-artifact@v4
        with:
          name: orm-results
          path: /tmp
        continue-on-error: true

      - name: Download static results
        uses: actions/download-artifact@v4
        with:
          name: static-results
          path: /tmp
        continue-on-error: true

      - name: Post review comments
        run: |
          python action/post_comments.py \
            --orm-results=/tmp/orm-results.json \
            --static-results=/tmp/static-results.json \
            --owner=${{ github.repository_owner }} \
            --repo=${{ github.event.repository.name }} \
            --pr=${{ github.event.pull_request.number }} \
            --sha=${{ github.event.pull_request.head.sha }}
        working-directory: prism-action
        env:
          GITHUB_TOKEN: ${{ github.token }}
